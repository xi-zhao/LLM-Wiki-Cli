[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "fokb"
version = "0.1.0a1"
description = "Agent-facing CLI for a local markdown wiki knowledge base"
readme = "README.md"
requires-python = ">=3.10"
authors = [
  { name = "xizhao" }
]
license = { text = "SEE LICENSE IN LICENSE.md" }

[project.scripts]
fokb = "scripts.fokb:main"

[tool.setuptools]
py-modules = []
